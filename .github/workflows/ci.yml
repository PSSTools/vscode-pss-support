name: CI
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ivpm
        run: pip install ivpm
      - name: Fetch packages
        run: ivpm update -a -d default-dev
      - name: Build HTML docs
        run: packages/python/bin/sphinx-build -W --keep-going docs docs/_build/html
      - name: Publish to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html


  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Java (for ANTLR grammar generation)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      - name: Install dependencies
        run: npm install
      - name: Build grammar
        run: npm run build:grammar
      - name: Build
        run: npm run compile

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run core tests
        run: npm run test:core

  test-lsp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run LSP tests
        run: npm run test:lsp

  test-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run benchmarks
        run: npm run test:bench
